<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Java Solver</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="app-shell">
    <div class="topbar">
      <div class="controls" aria-label="Main actions">
        <button id="summarizeBtn" class="shape-btn shape-circle" title="Summarize" aria-label="Summarize">
          S
        </button>
        <button id="solveBtn" class="shape-btn shape-pentagon" title="Generate solution" aria-label="Generate solution">
          G
        </button>
        <button id="copyBtn" class="shape-btn shape-circle" title="Copy code" aria-label="Copy code">
          C
        </button>
      </div>

      <div id="statusText" class="status-line" aria-live="polite">
        Ready.
      </div>
    </div>

    <main class="workspace">
      <section class="input-group">
        <label for="questionInput" class="tiny-label">question</label>
        <textarea
          id="questionInput"
          placeholder="..."
        ></textarea>
      </section>

      <section class="input-group">
        <label for="summaryOutput" class="tiny-label">summary</label>
        <textarea
          id="summaryOutput"
          placeholder="..."
        ></textarea>
      </section>

      <section class="input-group">
        <label for="solutionOutput" class="tiny-label">code</label>
        <textarea
          id="solutionOutput"
          readonly
          placeholder="..."
        ></textarea>
      </section>
    </main>
  </div>

  <script src="./script.js"></script>
</body>
</html>
