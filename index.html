<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Java Solver</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="container">
    <main class="main-grid">
      <section class="card">
        <div class="section-header">
          <h2>question</h2>
          <button id="summarizeBtn" class="icon-btn" title="Summarize">⌁</button>
        </div>
        <textarea
          id="questionInput"
          placeholder="full question here..."
        ></textarea>
      </section>

      <section class="card">
        <div class="section-header">
          <h2>summary</h2>
          <button id="solveBtn" class="icon-btn" title="Generate solution">→</button>
        </div>
        <textarea
          id="summaryOutput"
          placeholder="summary appears here..."
        ></textarea>
      </section>

      <section class="card code-card">
        <div class="section-header">
          <h2>code</h2>
          <button id="copyBtn" class="icon-btn" title="Copy code">⧉</button>
        </div>
        <pre id="solutionOutput">solution...</pre>
      </section>
    </main>

    <p id="statusText" class="status"></p>
  </div>

  <script src="./script.js"></script>
</body>
</html>
